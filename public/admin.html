<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Quiz Results</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .admin-card {
            padding: 20px;
            text-align: center;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background-color: #f8f9fa;
        }
        .error-msg {
            color: var(--google-red, red);
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-card">
            <h1>Admin Dashboard</h1>
            <p>Enter the secret code to view and download results.</p>
            
            <div class="input-group">
                <input type="password" id="admin-secret" placeholder="Enter Secret Code">
            </div>
            
            <div class="btn-group">
                <button id="view-btn" class="btn btn-blue">View Results</button>
                <button id="excel-btn" class="btn btn-green">Download Excel</button>
                <button id="csv-btn" class="btn btn-yellow">Download CSV</button>
            </div>
            <p id="admin-error" class="error-msg"></p>
            
            <div id="results-table-container">
                <table id="results-table">
                    <thead>
                        <tr>
                            <th>Team</th>
                            <th>Round</th>
                            <th>Score</th>
                            <th>Time</th>
                            <th>Timestamp</th>
                        </tr>
                    </thead>
                    <tbody id="results-body">
                        <!-- Data will be injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const secretInput = document.getElementById('admin-secret');
            const viewBtn = document.getElementById('view-btn');
            const excelBtn = document.getElementById('excel-btn');
            const csvBtn = document.getElementById('csv-btn');
            const errorMsg = document.getElementById('admin-error');
            const resultsBody = document.getElementById('results-body');

            async function fetchResults() {
                const secret = secretInput.value.trim();
                if (!secret) return alert('Please enter secret code');
                
                errorMsg.textContent = '';
                resultsBody.innerHTML = '<tr><td colspan="5">Loading...</td></tr>';
                
                try {
                    const res = await fetch(`/api/admin/results?secret=${encodeURIComponent(secret)}`);
                    if (!res.ok) {
                        const data = await res.json();
                        throw new Error(data.error || 'Unauthorized or error');
                    }
                    
                    const data = await res.json();
                    resultsBody.innerHTML = '';
                    
                    data.forEach(row => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${row['Team Name'] || 'N/A'}</td>
                            <td>${row['Round Number'] || 'N/A'}</td>
                            <td>${row['Score'] || '0'}</td>
                            <td>${row['Time Taken (s)'] || '0'}s</td>
                            <td>${row['Timestamp'] ? new Date(row['Timestamp']).toLocaleString() : 'N/A'}</td>
                        `;
                        resultsBody.appendChild(tr);
                    });
                    
                    if (data.length === 0) {
                        resultsBody.innerHTML = '<tr><td colspan="5">No results found yet.</td></tr>';
                    }
                } catch (e) {
                    errorMsg.textContent = e.message;
                    resultsBody.innerHTML = '<tr><td colspan="5">Error loading results.</td></tr>';
                }
            }

            function downloadExcel() {
                const secret = secretInput.value.trim();
                if (!secret) return alert('Please enter secret code');
                window.location.href = `/api/admin/download-excel?secret=${encodeURIComponent(secret)}`;
            }

            function downloadCSV() {
                const secret = secretInput.value.trim();
                if (!secret) return alert('Please enter secret code');
                window.location.href = `/api/admin/download-csv?secret=${encodeURIComponent(secret)}`;
            }

            viewBtn.addEventListener('click', fetchResults);
            excelBtn.addEventListener('click', downloadExcel);
            csvBtn.addEventListener('click', downloadCSV);
        });
    </script>
</body>
</html>
